<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Contentsquare -->
  <script src="https://t.contentsquare.net/uxa/fa014b9052a66.js" defer></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Today | MeowTarot</title>
  <meta name="description" content="See your daily streak and today's drawn tarot card." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.meowtarot.com/today/" />
  <link rel="alternate" href="https://www.meowtarot.com/today/" hreflang="en" />
  <link rel="alternate" href="https://www.meowtarot.com/th/today/" hreflang="th-TH" />
  <link rel="alternate" href="https://www.meowtarot.com/today/" hreflang="x-default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" />
  </noscript>
  <link rel="preload" href="/css/styles.css" as="style" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/theme-tokens.css" />
  <link rel="stylesheet" href="/css/phase-2-header.css" />
  <link rel="stylesheet" href="/css/phase-2-1-logo.css" />
</head>
<body data-page="daily">
  <header id="site-header"></header>

  <main class="page-shell today-page">
    <section class="today-card">
      <h1>Today</h1>
      <p class="today-streak" id="today-streak">🔥 Day 0 streak</p>
      <div id="today-empty">
        <p class="today-empty-copy">Draw your card for today and keep the streak going.</p>
        <a class="btn btn-primary" href="/daily.html">Draw your card for today</a>
      </div>
      <div id="today-filled" hidden>
        <figure class="today-card__figure">
          <img id="today-card-image" alt="Today's tarot card" loading="lazy" width="360" height="600" />
        </figure>
        <h2 id="today-card-name"></h2>
        <p class="today-keywords" id="today-card-keywords"></p>
        <p class="today-meaning" id="today-card-meaning"></p>
        <div class="today-actions">
          <button type="button" class="btn btn-secondary" id="today-share">Share</button>
          <a class="btn btn-secondary" href="/question.html">Want a fuller reading? Ask</a>
          <a class="btn btn-secondary" href="/full.html">Want a fuller reading? Full</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script type="module" src="/js/today.js"></script>
</body>
</html>
