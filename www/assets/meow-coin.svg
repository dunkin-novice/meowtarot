<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Meow Coin">
  <defs>
    <radialGradient id="mcFace" cx="38%" cy="30%" r="78%">
      <stop offset="0%" stop-color="#ffefc0"/>
      <stop offset="45%" stop-color="#f5c25a"/>
      <stop offset="100%" stop-color="#d8973a"/>
    </radialGradient>
    <linearGradient id="mcRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbdc8c"/>
      <stop offset="100%" stop-color="#b9772a"/>
    </linearGradient>
  </defs>
  <!-- coin body -->
  <circle cx="32" cy="32" r="30" fill="url(#mcRim)"/>
  <circle cx="32" cy="32" r="26" fill="url(#mcFace)" stroke="#b9772a" stroke-width="1.5"/>
  <!-- inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#c9933a" stroke-width="1.4" stroke-opacity="0.5"/>
  <!-- cat face emblem (plum) -->
  <g fill="#3d1a5c">
    <!-- ears -->
    <path d="M20.5 21.5 19 12.5l8 5.2z"/>
    <path d="M43.5 21.5 45 12.5l-8 5.2z"/>
    <!-- head -->
    <path d="M32 19.5c-7.2 0-12.4 5-12.4 11.6 0 6.9 5.6 11.4 12.4 11.4s12.4-4.5 12.4-11.4C44.4 24.5 39.2 19.5 32 19.5z"/>
  </g>
  <!-- inner ear -->
  <path d="M21.2 19 20.4 14.6l4.1 2.7z" fill="#c66aa0"/>
  <path d="M42.8 19 43.6 14.6l-4.1 2.7z" fill="#c66aa0"/>
  <!-- eyes -->
  <ellipse cx="27" cy="29.5" rx="1.9" ry="2.6" fill="#ffefc0"/>
  <ellipse cx="37" cy="29.5" rx="1.9" ry="2.6" fill="#ffefc0"/>
  <!-- nose -->
  <path d="M32 33.5l-1.6 1.7h3.2z" fill="#c66aa0"/>
  <!-- whiskers -->
  <g stroke="#ffefc0" stroke-width="0.9" stroke-linecap="round" opacity="0.9">
    <line x1="24" y1="34" x2="18.5" y2="33"/>
    <line x1="24" y1="36" x2="19" y2="36.5"/>
    <line x1="40" y1="34" x2="45.5" y2="33"/>
    <line x1="40" y1="36" x2="45" y2="36.5"/>
  </g>
  <!-- shine -->
  <ellipse cx="23" cy="19" rx="6.5" ry="3.6" fill="#fff" opacity="0.32"/>
</svg>
