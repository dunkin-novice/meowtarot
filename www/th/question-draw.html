<body data-page="question-draw">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5FLMLJ6R"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
  <header id="site-header"></header>

  <main class="page-shell question-draw-shell" data-question-spread="story">

    <div class="question-draw-topbar">
      <div class="question-draw-topbar__eyebrow question-draw-topbar__eyebrow--quick">Quick Pull · ดึงไพ่เร็ว</div>
      <div class="question-draw-topbar__eyebrow question-draw-topbar__eyebrow--story">Story Spread · เรื่องราว</div>
    </div>

    <section class="question-draw-recap">
      <div class="question-draw-recap__eyebrow">คำถามของคุณ</div>
      <h2 class="question-draw-recap__text" id="question-selected-topic-title"></h2>
    </section>

    <section class="question-draw-title">
      <h1 class="question-draw-title__en question-draw-title__en--quick">Pick one card</h1>
      <h2 class="question-draw-title__th question-draw-title__th--quick thai-serif">เลือกหนึ่งใบ</h2>
      <h1 class="question-draw-title__en question-draw-title__en--story">Pick three — past, present, future</h1>
      <h2 class="question-draw-title__th question-draw-title__th--story thai-serif">เลือกสามใบ · อดีต · ปัจจุบัน · อนาคต</h2>
    </section>

    <section class="question-draw-legend" aria-label="ตำแหน่งไพ่">
      <div class="question-draw-legend__item">
        <span class="question-draw-legend__num">1</span>
        <span class="question-draw-legend__label">Past</span>
        <span class="question-draw-legend__label-th thai">อดีต</span>
      </div>
      <div class="question-draw-legend__item">
        <span class="question-draw-legend__num">2</span>
        <span class="question-draw-legend__label">Present</span>
        <span class="question-draw-legend__label-th thai">ปัจจุบัน</span>
      </div>
      <div class="question-draw-legend__item">
        <span class="question-draw-legend__num">3</span>
        <span class="question-draw-legend__label">Future</span>
        <span class="question-draw-legend__label-th thai">อนาคต</span>
      </div>
    </section>

    <!-- Shuffle pill ABOVE the board — matches the Daily board layout. -->
    <div class="question-shuffle-row">
      <button id="question-reset" type="button" class="question-draw-reset" aria-label="สับไพ่">
        <span class="question-draw-reset__ico" aria-hidden="true">↻</span>
        <span>สับไพ่</span>
      </button>
    </div>

    <div id="question-card-board" class="card-board card-board--three" aria-live="polite"></div>

    <div class="question-draw-counter" aria-live="polite">
      <span id="question-counter">0/3</span>
    </div>

    <div class="question-draw-cta-row">
      <button id="question-continue" type="button" class="ritual-cta question-draw-button" disabled>
        <span class="question-draw-button__label question-draw-button__label--quick">Draw · เปิดไพ่</span>
        <span class="question-draw-button__label question-draw-button__label--story">Reveal spread · เปิดไพ่</span>
      </button>
    </div>

  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="../js/main.js?v=20260622g"></script>
</body>
</html>
