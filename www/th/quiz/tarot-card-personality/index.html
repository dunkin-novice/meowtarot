  <header id="site-header"></header>

  <main class="page-shell quiz-page" data-quiz>

    <!-- INTRO -->
    <section class="quiz-view quiz-view--intro" data-view="intro">
      <div class="quiz-hero">
        <div class="quiz-hero__glow" aria-hidden="true"></div>
        <span class="quiz-hero__spark quiz-hero__spark--1" aria-hidden="true">✦</span>
        <span class="quiz-hero__spark quiz-hero__spark--2" aria-hidden="true">✦</span>
        <span class="quiz-hero__spark quiz-hero__spark--3" aria-hidden="true">✦</span>
        <div class="quiz-hero__fan">
          <img class="quiz-hero__card quiz-hero__card--l" src="https://cdn.meowtarot.com/assets/moonmallow/00-back.webp?v=2026-03" alt="" loading="eager" />
          <img class="quiz-hero__card quiz-hero__card--r" src="https://cdn.meowtarot.com/assets/moonmallow/00-back.webp?v=2026-03" alt="" loading="eager" />
          <img class="quiz-hero__card quiz-hero__card--c" src="https://cdn.meowtarot.com/assets/moonmallow/00-back.webp?v=2026-03" alt="" loading="eager" />
        </div>
      </div>
      <p class="quiz-eyebrow" id="quizEyebrow"></p>
      <h1 class="quiz-title" id="quizTitle"></h1>
      <p class="quiz-intro" id="quizIntro"></p>
      <div class="quiz-intro-spacer"></div>
      <button class="quiz-start-btn" id="quizStartBtn" type="button"></button>
      <p class="quiz-time" id="quizTime"></p>
    </section>

    <!-- QUESTION -->
    <section class="quiz-view quiz-view--question" data-view="question" aria-live="polite" hidden>
      <div class="quiz-progress">
        <div class="quiz-progress__row">
          <span class="quiz-progress__count" id="quizProgressCount"></span>
          <span class="quiz-progress__left" id="quizProgressLeft"></span>
        </div>
        <div class="quiz-progress__bar" id="quizProgressBar"></div>
      </div>
      <div class="quiz-q">
        <p class="quiz-q__eyebrow" id="quizQEyebrow"></p>
        <h2 class="quiz-q__prompt" id="quizPrompt"></h2>
      </div>
      <div class="quiz-answers" id="quizAnswers"></div>
      <div class="quiz-q-spacer"></div>
      <p class="quiz-hint" id="quizHint"></p>
    </section>

    <!-- RESULT -->
    <section class="quiz-view quiz-view--result" data-view="result" aria-live="polite" hidden>
      <div class="quiz-card" id="quizShareCard">
        <p class="quiz-card__eyebrow" id="quizResultLead"></p>
        <div class="quiz-card__art">
          <div class="quiz-card__aura" aria-hidden="true"></div>
          <img id="quizResultImage" alt="" loading="lazy" />
        </div>
        <div class="quiz-card__name">
          <span class="quiz-card__name-en" id="quizResultNameEn"></span>
          <span class="quiz-card__name-th" id="quizResultNameTh"></span>
        </div>
        <p class="quiz-card__summary" id="quizResultSummary"></p>
        <div class="quiz-card__traits" id="quizResultTraits"></div>
        <div class="quiz-card__mark" id="quizResultMark"></div>
      </div>
      <p class="quiz-saved" id="quizSaved" hidden></p>
      <div class="quiz-result-spacer"></div>
      <button class="quiz-share-btn" id="quizShareBtn" type="button"></button>
      <div class="quiz-result-actions">
        <a class="quiz-result-btn" id="quizDailyCta" href="/th/daily.html"></a>
        <button class="quiz-result-btn quiz-result-btn--ghost" id="quizRestartBtn" type="button"></button>
      </div>
      <p class="quiz-share-status" id="quizShareStatus" aria-live="polite"></p>
    </section>
