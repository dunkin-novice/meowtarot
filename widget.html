<style>
  :root{
    --plum:#3d1a5c; --plum-deep:#2a1142; --gold:#c9933a; --rose:#e8457a; --cream:#fdf6ee;
    --bg:linear-gradient(160deg,#f0eaff 0%,#fce4f0 50%,#e4f0ff 100%);
    --cta:linear-gradient(135deg,#6e1d4c 0%,#d12878 45%,#e8a838 100%);
    --display:"Cormorant Garamond","Noto Serif Thai",Georgia,serif;
    --body:"DM Sans","IBM Plex Sans Thai",system-ui,sans-serif;
  }
  html[lang="th"]{ --display:"Noto Serif Thai","Cormorant Garamond",serif; --body:"IBM Plex Sans Thai","DM Sans",sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--plum); background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    padding:16px; min-height:100%; -webkit-font-smoothing:antialiased;
  }
  .w{
    width:100%; max-width:340px; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .brand{ font-family:var(--display); font-style:italic; font-weight:700; font-size:21px;
    color:var(--gold); letter-spacing:.01em; line-height:1; }
  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    color:var(--plum); opacity:.62; }
  /* spread selector chips */
  .spreads{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .chip{ appearance:none; cursor:pointer; font-family:var(--body); font-weight:600; font-size:12.5px;
    color:var(--plum); background:rgba(255,255,255,.6); border:1.5px solid rgba(61,26,92,.16);
    border-radius:100px; padding:7px 15px; transition:transform .12s ease, background .15s ease, color .15s ease, box-shadow .15s ease; }
  .chip:active{ transform:translateY(1px); }
  .chip.is-active{ background:var(--cta); color:#fff; border-color:transparent; box-shadow:0 6px 16px -7px rgba(209,40,120,.55); }
  /* spread layout (1 or 3 cards) */
  .spread{ display:flex; gap:10px; justify-content:center; align-items:flex-start; width:100%; }
  .cardwrap{ display:flex; flex-direction:column; align-items:center; gap:7px; min-width:0;
    text-decoration:none; color:inherit; }
  .spread.is-one .cardwrap{ width:100%; }
  .spread.is-three .cardwrap{ flex:1 1 0; }
  .pos{ font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--plum); opacity:.58; min-height:12px; }
  .card{
    width:100%; max-width:166px; aspect-ratio:1568/2720; border-radius:16px; margin:0 auto;
    background:linear-gradient(155deg,#d9c6f2,#f3d6e8); box-shadow:0 14px 34px -10px rgba(61,26,92,.45);
    overflow:hidden; position:relative; transition:transform .45s ease, opacity .35s ease;
  }
  .spread.is-one .card{ width:min(58%,166px); }
  .spread.is-three .card{ width:100%; border-radius:12px; box-shadow:0 10px 24px -10px rgba(61,26,92,.45); }
  .card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card.flip{ transform:rotateY(8deg) scale(1.02); }
  .cname{ font-family:var(--display); font-weight:600; line-height:1.12; color:var(--plum); }
  .spread.is-one .cname{ font-size:27px; min-height:30px; }
  .spread.is-three .cname{ font-size:12.5px; }
  a.cardwrap:hover .cname{ text-decoration:underline; }
  .keys{ font-size:13.5px; font-weight:500; color:var(--plum); opacity:.78; line-height:1.45; min-height:20px; }
  .btn{
    appearance:none; border:0; cursor:pointer; font-family:var(--body); font-weight:700;
    font-size:15px; color:#fff; background:var(--cta); border-radius:100px;
    padding:13px 26px; box-shadow:0 8px 20px -6px rgba(209,40,120,.5); transition:transform .12s ease, filter .12s ease;
    text-decoration:none; display:inline-block;
  }
  .btn:active{ transform:translateY(1px) scale(.99); }
  .btn:hover{ filter:brightness(1.05); }
  .btn--ghost{ background:none; color:var(--plum); box-shadow:none; border:1.5px solid rgba(61,26,92,.28);
    padding:11px 22px; font-size:14px; font-weight:600; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .foot{ font-size:11.5px; color:var(--plum); opacity:.66; margin-top:2px; }
  .foot a{ color:var(--gold); font-weight:700; text-decoration:none; }
  .hidden{ display:none !important; }
  .reveal{ animation:fade .5s ease both; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  /* pick-a-card board */
  .hint{ font-size:12.5px; font-weight:600; letter-spacing:.04em; color:var(--plum); opacity:.72; min-height:16px; }
  .board{ display:flex; justify-content:center; align-items:flex-end; width:100%; padding:14px 0 6px; min-height:96px; }
  .bcard{ appearance:none; padding:0; width:46px; aspect-ratio:1568/2720; border-radius:9px; margin:0 -8px;
    cursor:pointer; background:linear-gradient(155deg,#d9c6f2,#f3d6e8); box-shadow:0 8px 18px -8px rgba(61,26,92,.45);

    transition:transform .16s ease, box-shadow .16s ease, margin .16s ease, opacity .2s ease; }
  .bcard img{ width:100%; height:100%; object-fit:cover; display:block; }
  .bcard:hover, .bcard:focus-visible{ transform:translateY(-12px); margin:0 -2px; outline:none;
    box-shadow:0 16px 28px -10px rgba(61,26,92,.5); }
  .bcard.sel{ transform:translateY(-16px); margin:0 -2px; border-color:var(--gold);
    box-shadow:0 18px 30px -10px rgba(201,147,58,.6); }
  .bcard.dim{ opacity:.45; pointer-events:none; }
</style>
</head>

(function(){
  const params = new URLSearchParams(location.search);
  const lang = (params.get('lang') === 'th' || location.pathname.includes('/th/')) ? 'th' : 'en';
  document.documentElement.lang = lang;
  const base = lang === 'th' ? 'https://www.meowtarot.com/th' : 'https://www.meowtarot.com';
  const T = {
    en: { eyebrow:'Free Tarot Draw', again:'Draw again', pickOne:'Tap a card to reveal it ✨', pickThree:'Pick 3 cards',
          read:'Read full meaning →', readFull:'Get your full reading →', powered:'Free tarot reading by MeowTarot',
          getWidget:'Get your own free tarot widget →', one:'Single Card', three:'Past · Present · Future' },
    th: { eyebrow:'เปิดไพ่ทาโรต์ฟรี', again:'เปิดใหม่อีกครั้ง', pickOne:'แตะไพ่เพื่อเปิดคำทำนาย ✨', pickThree:'เลือกไพ่ 3 ใบ',
          read:'อ่านความหมายเต็ม →', readFull:'ดูคำทำนายแบบเต็ม →', powered:'ดูดวงทาโรต์ฟรีที่ MeowTarot',
          getWidget:'รับวิดเจ็ตทาโรต์ฟรีไปใส่เว็บคุณ →', one:'ไพ่ใบเดียว', three:'อดีต · ปัจจุบัน · อนาคต' }
  }[lang];
  // ?promo=1 -> this widget is on OUR OWN site, where the "read at MeowTarot" link is a
  // redundant self-link; swap it to a CTA that drives site owners to embed/install the widget.
  // External embeds (no promo flag) keep the do-follow backlink — that's the SEO point.
  const promo = params.get('promo') === '1';

  const SPREADS = {
    one:   { n:1, pos:{ en:[''], th:[''] } },
    three: { n:3, pos:{ en:['Past','Present','Future'], th:['อดีต','ปัจจุบัน','อนาคต'] } }
  };

  const $ = (id) => document.getElementById(id);
  const IMG = (id) => 'https://cdn.meowtarot.com/assets/moonmallow/' + id + '.webp';
  const BACK = 'https://cdn.meowtarot.com/assets/moonmallow/00-back.webp';
  const U = '?utm_source=widget&utm_medium=embed&utm_campaign=';

  $('eyebrow').textContent = T.eyebrow;
  $('againBtn').textContent = T.again;
  if (promo){
    $('poweredBy').textContent = '✨ ' + T.getWidget;
    $('poweredBy').href = 'https://www.meowtarot.com/widgets/' + U + 'getwidget';
  } else {
    $('poweredBy').textContent = '✨ ' + T.powered;
    $('poweredBy').href = base + '/' + U + 'poweredby';
  }

  const chips = [...document.querySelectorAll('.chip')];
  chips.forEach(c => { c.textContent = T[c.dataset.spread]; });

  let spread = (params.get('spread') === 'three') ? 'three' : 'one';
  const spreadEl = $('spread'), keysEl = $('keys');

  function syncChips(){ chips.forEach(c => c.classList.toggle('is-active', c.dataset.spread === spread)); }
  function makeCard(){ const cd = document.createElement('div'); cd.className = 'card'; return cd; }

  const boardEl = $('board'), hintEl = $('hint');
  const BOARD_N = 7;          // face-down cards offered on the board
  let dealt = [];             // the hidden cards behind those backs
  let chosen = [];            // cards the user tapped, in pick order

  function pick(n){
    const a = CARDS.slice();
    for (let i = a.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a.slice(0, n);
  }

  function setHint(){
    const need = SPREADS[spread].n;
    hintEl.textContent = need === 1 ? T.pickOne : (T.pickThree + ' · ' + chosen.length + '/' + need);
  }

  // Board phase: a fanned row of face-down cards the user picks from.
  function board(){
    dealt = pick(BOARD_N);
    chosen = [];
    spreadEl.className = 'spread is-' + spread + ' hidden';
    spreadEl.innerHTML = '';
    keysEl.textContent = '';
    $('readBtn').classList.add('hidden');
    $('againBtn').classList.add('hidden');
    boardEl.classList.remove('hidden');
    hintEl.classList.remove('hidden');
    boardEl.innerHTML = '';
    dealt.forEach((c, i) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'bcard'; b.setAttribute('aria-label', 'Pick card ' + (i + 1));
      const im = new Image(); im.src = BACK; im.alt = ''; im.decoding = 'async'; b.appendChild(im);
      b.addEventListener('click', () => onPick(i, b));
      boardEl.appendChild(b);
    });
    setHint();
  }

  function onPick(i, el){
    const need = SPREADS[spread].n;
    if (el.classList.contains('sel') || chosen.length >= need) return;
    el.classList.add('sel');
    chosen.push(dealt[i]);
    setHint();
    if (chosen.length >= need){
      [...boardEl.children].forEach(ch => { if (!ch.classList.contains('sel')) ch.classList.add('dim'); });
      setTimeout(reveal, 280);
    }
  }

  // Reveal the picked card(s) in the spread layout.
  function reveal(){
    const sp = SPREADS[spread];
    const cards = chosen.slice(0, sp.n);
    boardEl.classList.add('hidden');
    hintEl.classList.add('hidden');
    spreadEl.className = 'spread is-' + spread;
    spreadEl.innerHTML = '';
    cards.forEach((c, i) => {
      const name = (c.em ? c.em + ' ' : '') + (lang === 'th' ? c.th : c.en);
      const wrap = document.createElement('a');
      wrap.className = 'cardwrap reveal';
      wrap.href = base + '/cards/' + c.s + '/' + U + 'card';
      wrap.target = '_blank'; wrap.rel = 'noopener';
      wrap.style.animationDelay = (i * 90) + 'ms';
      if (spread !== 'one'){ const p = document.createElement('div'); p.className = 'pos'; p.textContent = sp.pos[lang][i]; wrap.appendChild(p); }
      const cd = makeCard();
      const im = new Image(); im.src = IMG(c.id); im.alt = name + ' — MeowTarot'; im.decoding = 'async';
      im.onerror = () => { if (im.src !== BACK) im.src = BACK; };
      cd.appendChild(im); wrap.appendChild(cd);
      const nm = document.createElement('div'); nm.className = 'cname'; nm.textContent = name; wrap.appendChild(nm);
      spreadEl.appendChild(wrap);
    });
    const read = $('readBtn');
    if (spread === 'one'){
      keysEl.textContent = lang === 'th' ? cards[0].kt : cards[0].ke;
      read.textContent = T.read;
      read.href = base + '/cards/' + cards[0].s + '/' + U + 'card';
    } else {
      keysEl.textContent = '';
      read.textContent = T.readFull;
      read.href = base + '/question.html' + U + 'spread';
    }
    read.classList.remove('hidden');
    $('againBtn').textContent = T.again;
    $('againBtn').classList.remove('hidden');
  }

  chips.forEach(c => c.addEventListener('click', () => {
    if (spread === c.dataset.spread) return;
    spread = c.dataset.spread; syncChips(); board();
  }));
  // "Draw again" returns to a fresh pick board.
  $('againBtn').addEventListener('click', board);

  syncChips();
  board();
})();
</script>
</body>
</html>
