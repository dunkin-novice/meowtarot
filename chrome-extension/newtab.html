<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>New Tab — MeowTarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://cdn.meowtarot.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+Thai:wght@600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" />
<style>
  :root{
    --plum:#3d1a5c; --gold:#c9933a; --rose:#e8457a;
    --bg:linear-gradient(160deg,#f0eaff 0%,#fce4f0 50%,#e4f0ff 100%);
    --cta:linear-gradient(135deg,#6e1d4c 0%,#d12878 45%,#e8a838 100%);
    --display:"Cormorant Garamond","Noto Serif Thai",Georgia,serif;
    --body:"DM Sans","IBM Plex Sans Thai",system-ui,sans-serif;
  }
  html[lang="th"]{ --display:"Noto Serif Thai","Cormorant Garamond",serif; --body:"IBM Plex Sans Thai","DM Sans",sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--body); color:var(--plum); background:var(--bg);
    display:flex; align-items:center; justify-content:center; padding:24px;
    min-height:100%; -webkit-font-smoothing:antialiased;
  }
  .w{ width:100%; max-width:300px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .brand{ font-family:var(--display); font-style:italic; font-weight:700; font-size:30px; color:var(--gold); line-height:1; }
  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--plum); opacity:.6; min-height:14px; }
  .cardlink{ text-decoration:none; display:block; width:min(62%,196px); }
  .card{
    width:100%; aspect-ratio:1568/2720; border-radius:18px; overflow:hidden; position:relative;
    background:linear-gradient(155deg,#d9c6f2,#f3d6e8); box-shadow:0 18px 40px -12px rgba(61,26,92,.45);
  }
  .card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card.reveal{ animation:pop .5s cubic-bezier(.2,.7,.2,1.2) both; }
  @keyframes pop{ from{ opacity:0; transform:translateY(10px) scale(.94) rotate(-2deg); } to{ opacity:1; transform:none; } }
  .cname{ font-family:var(--display); font-weight:700; font-size:28px; line-height:1.1; min-height:30px; }
  .keys{ font-size:13px; line-height:1.5; color:var(--plum); opacity:.78; min-height:18px; }
  .read{ font-weight:700; font-size:13.5px; color:var(--rose); text-decoration:none; }
  .read:hover{ text-decoration:underline; }
  .another{
    appearance:none; cursor:pointer; font-family:var(--body); font-weight:700; font-size:14px; color:#fff;
    background:var(--cta); border:0; border-radius:100px; padding:11px 22px; margin-top:2px;
    box-shadow:0 10px 24px -10px rgba(209,40,120,.6); transition:transform .12s ease, box-shadow .15s ease;
  }
  .another:active{ transform:translateY(1px); }
  .more{ font-size:12px; font-weight:600; color:var(--plum); opacity:.62; text-decoration:none; margin-top:4px; }
  .more:hover{ opacity:.9; text-decoration:underline; }
</style>
</head>
<body>
  <main class="w">
    <div class="brand">MeowTarot</div>
    <div class="eyebrow" id="eyebrow"></div>
    <a class="cardlink" id="cardlink" target="_blank" rel="noopener">
      <div class="card" id="card"><img id="cardimg" alt="" decoding="async" /></div>
    </a>
    <div class="cname" id="cname"></div>
    <div class="keys" id="keys"></div>
    <a class="read" id="readBtn" target="_blank" rel="noopener"></a>
    <button class="another" id="anotherBtn" type="button"></button>
    <a class="more" id="moreBtn" target="_blank" rel="noopener"></a>
  </main>
  <script src="newtab.js"></script>
</body>
</html>
