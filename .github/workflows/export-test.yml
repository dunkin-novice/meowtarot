name: Export Self-Test

on:
  push:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Full URL to the page with ?selftest=1 (e.g. https://www.meowtarot.com/reading.html?selftest=1)'
        required: false
        default: 'https://www.meowtarot.com/reading.html?selftest=1'

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        id: playwright-install
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Verify Playwright browser availability
        run: |
          if [ "${{ steps.playwright-install.outcome }}" = "success" ]; then
            exit 0
          fi
          node -e "const fs=require('fs'); const {chromium}=require('playwright'); const p=chromium.executablePath(); if(!fs.existsSync(p)){console.error('::error::Playwright install failed and no cached Chromium executable was found. Run `npx playwright install --with-deps` in CI or use a Playwright Docker image fallback.'); process.exit(1);} console.log('Using cached Chromium executable at', p);"

      - name: Run export self-test
        env:
          TARGET_URL: ${{ github.event.inputs.target_url || 'https://www.meowtarot.com/reading.html?selftest=1' }}
        run: npx playwright test tests/export.spec.js

      - name: Upload artifacts (screenshots and reports)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-selftest-artifacts
          path: |
            artifacts
            playwright-report
          if-no-files-found: ignore

  poster-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        id: playwright-install
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Verify Playwright browser availability
        run: |
          if [ "${{ steps.playwright-install.outcome }}" = "success" ]; then
            exit 0
          fi
          node -e "const fs=require('fs'); const {chromium}=require('playwright'); const p=chromium.executablePath(); if(!fs.existsSync(p)){console.error('::error::Playwright install failed and no cached Chromium executable was found. Run `npx playwright install --with-deps` in CI or use a Playwright Docker image fallback.'); process.exit(1);} console.log('Using cached Chromium executable at', p);"

      - name: CDN debug script (non-blocking)
        continue-on-error: true
        run: |
          mkdir -p artifacts
          node scripts/debug-cdn-headers.mjs | tee artifacts/cdn-headers-debug.log

      - name: CDN evidence via curl (non-blocking)
        continue-on-error: true
        run: |
          mkdir -p artifacts
          urls=(
            "https://cdn.meowtarot.com/assets/meow-v2/00-back.webp"
            "https://cdn.meowtarot.com/assets/meow-v1/01-the-fool-upright.webp"
            "https://cdn.meowtarot.com/backgrounds/bg-000.webp"
          )

          {
            for url in "${urls[@]}"; do
              echo ""
              echo "===== HEAD $url ====="
              curl -sS -I "$url" | sed -n '/^HTTP\//p; /^content-type:/Ip; /^cache-control:/Ip; /^access-control-allow-origin:/Ip; /^cross-origin-resource-policy:/Ip; /^cf-ray:/Ip; /^server:/Ip'

              echo ""
              echo "===== RANGE GET $url ====="
              curl -sS -D - -o /dev/null -r 0-1023 "$url" | sed -n '/^HTTP\//p; /^content-type:/Ip; /^cache-control:/Ip; /^access-control-allow-origin:/Ip; /^cross-origin-resource-policy:/Ip; /^cf-ray:/Ip; /^server:/Ip'
            done
          } | tee artifacts/cdn-curl-evidence.log

      - name: Generate offline fixture images (32x32 PNG)
        run: node scripts/gen-ci-fixtures.mjs

      - name: Verify generated fixtures
        run: ls -l tests/fixtures

      - name: Ensure Playwright browsers before poster debug
        run: npx playwright install --with-deps chromium

      - name: Run poster debug CI script
        env:
          USE_LOCAL_ASSETS: '1'
        run: node scripts/debug-poster-ci.mjs

      - name: Upload poster debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poster-debug-artifacts
          path: |
            artifacts/*.webp
            artifacts/cdn-headers-debug.log
            artifacts/cdn-curl-evidence.log
          if-no-files-found: error

  share-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify cards.json accessibility + asset pack resolution
        run: node --test tests/cards-json-access.test.js tests/asset-pack-resolution.test.js tests/poster-payload-ready.test.js

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        id: playwright-install
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Verify Playwright browser availability
        run: |
          if [ "${{ steps.playwright-install.outcome }}" = "success" ]; then
            exit 0
          fi
          node -e "const fs=require('fs'); const {chromium}=require('playwright'); const p=chromium.executablePath(); if(!fs.existsSync(p)){console.error('::error::Playwright install failed and no cached Chromium executable was found. Run `npx playwright install --with-deps` in CI or use a Playwright Docker image fallback.'); process.exit(1);} console.log('Using cached Chromium executable at', p);"

      - name: CDN smoke check (non-blocking)
        run: |
          check_url() {
            local url="$1"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" -I "$url" || echo "000")
            if [ "$status" != "200" ]; then
              echo "::warning::CDN smoke check non-200 for $url (status=$status). Continuing with offline fixtures."
            else
              echo "CDN smoke check OK: $url"
            fi
          }
          check_url "https://cdn.meowtarot.com/backgrounds/bg-000.webp"
          check_url "https://cdn.meowtarot.com/assets/meow-v1/01-the-fool-upright.webp"


      - name: Generate offline fixture images (32x32 PNG)
        run: node scripts/gen-ci-fixtures.mjs

      - name: Verify generated fixtures
        run: ls -l tests/fixtures

      - name: Ensure Playwright browsers before share integrity test
        run: npx playwright install --with-deps chromium

      - name: Verify share payload + poster content
        env:
          USE_LOCAL_ASSETS: '1'
        run: npx playwright test tests/share-poster-content.spec.js

      - name: Upload share integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: share-integrity-artifacts
          path: playwright-report
          if-no-files-found: ignore
