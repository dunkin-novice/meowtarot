<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>วันนี้ | MeowTarot</title>
  <meta name="description" content="ดูสตรีคและไพ่ประจำวันของคุณ" />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.meowtarot.com/th/today/" />
  <link rel="alternate" href="https://www.meowtarot.com/today/" hreflang="en" />
  <link rel="alternate" href="https://www.meowtarot.com/th/today/" hreflang="th-TH" />
  <link rel="alternate" href="https://www.meowtarot.com/today/" hreflang="x-default" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="daily">
  <header id="site-header"></header>

  <main class="page-shell today-page">
    <section class="today-card">
      <h1>วันนี้</h1>
      <p class="today-streak" id="today-streak">🔥 สตรีควันที่ 0</p>
      <div id="today-empty">
        <p class="today-empty-copy">ยังไม่ได้จั่วไพ่วันนี้ ลองจั่วเพื่อรักษาสตรีคของคุณ</p>
        <a class="btn btn-primary" href="/th/daily.html">จั่วไพ่ประจำวัน</a>
      </div>
      <div id="today-filled" hidden>
        <figure class="today-card__figure">
          <img id="today-card-image" alt="ไพ่ทาโรต์ของวันนี้" loading="lazy" width="360" height="600" />
        </figure>
        <h2 id="today-card-name"></h2>
        <p class="today-keywords" id="today-card-keywords"></p>
        <p class="today-meaning" id="today-card-meaning"></p>
        <div class="today-actions">
          <button type="button" class="btn btn-secondary" id="today-share">แชร์</button>
          <a class="btn btn-secondary" href="/th/question.html">อยากเจาะลึก? ถามคำถาม</a>
          <a class="btn btn-secondary" href="/th/full.html">อยากเจาะลึก? ดูดวงชีวิต</a>
        </div>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script type="module" src="/js/today.js"></script>
</body>
</html>
