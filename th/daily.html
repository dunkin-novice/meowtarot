<body data-page="daily">
  <!-- Google Tag Manager (noscript) -->

  <header id="site-header"></header>

  <main class="page-shell board-page daily-shell">

    <!-- Selection Board — 12-slot grid. The pre-draw ceremonial state was
         removed in the Phase 5 review pass; users now land directly here
         and main.js renderDaily auto-deals the 12 cards on init. -->
    <section class="daily-state daily-state--board" aria-labelledby="daily-board-title">
      <div class="daily-topbar daily-topbar--board">
        <div class="daily-topbar__deck">
          <div class="daily-topbar__deck-eyebrow">From the deck</div>
          <div class="daily-topbar__deck-name">เหมียวฝันหวาน</div>
        </div>
        <div class="daily-topbar__streak-chip" aria-label="สตรีครายวัน">
          <span class="daily-topbar__streak-num">✦</span>
          <span class="daily-topbar__streak-label">วันต่อเนื่อง</span>
        </div>
      </div>

      <div class="daily-board-title">
        <h1 class="daily-board-title__en" id="daily-board-title">Choose your card</h1>
        <h2 class="daily-board-title__th thai-serif">เลือกไพ่ของคุณ</h2>
      </div>

      <!-- Shuffle: re-deals a fresh 12-card spread and clears any pick -->
      <div class="daily-shuffle-row">
        <button class="daily-shuffle-btn" type="button" id="daily-shuffle" aria-label="สับไพ่">
          <span class="daily-shuffle-btn__ico" aria-hidden="true">↻</span>
          <span class="thai">สับไพ่</span>
        </button>
      </div>

      <div class="card-board card-board--daily" id="daily-board" aria-live="polite"></div>

      <div class="daily-board-counter" aria-live="polite">
        <span id="daily-counter">0/1</span>
      </div>

      <div class="daily-state__cta-row">
        <button class="primary continue-btn action-btn daily-continue-button" type="button" id="daily-continue" data-i18n="continue" disabled>Continue · ต่อไป</button>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="../js/main.js?v=20260622f"></script>
