<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MeowTarot | Profile</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    />
  </noscript>
  <link rel="preload" href="../css/styles.css" as="style" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-page="profile">
  <header id="site-header"></header>
  <main class="page-shell">
    <section class="section-block results show reading-card">
      <section class="reading-intro">
        <p class="eyebrow" data-i18n="profileTitle">โปรไฟล์</p>
        <h1 data-i18n="profileTitle">โปรไฟล์</h1>
      </section>
      <div id="profile-identity" class="reading-content"></div>
      <div id="profile-streak" class="reading-content"></div>
      <div id="profile-history" class="reading-content"></div>
      <div id="profile-cta" class="reading-content"></div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script type="module" src="../js/profile.js"></script>
</body>
</html>
