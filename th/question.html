<body data-page="question">
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5FLMLJ6R"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header id="site-header"></header>

  <main class="page-shell question-shell">

    <div class="question-topbar">
      <div class="question-topbar__eyebrow">Ask a question</div>
      <div class="question-topbar__eyebrow-th thai">ถามคำถาม</div>
    </div>

    <section class="question-heading">
      <h1 class="question-heading__en">What's on your mind?</h1>
      <h2 class="question-heading__th thai-serif">คุณอยากถามอะไร</h2>
    </section>

    <section class="question-topics">
      <div class="question-topics__eyebrow">Topic · หัวข้อ</div>
      <div class="topic-card-grid question-topics__chips" id="question-topic-grid"></div>
    </section>

    <!-- Question text input: visual placeholder this round. Value not persisted -->
    <section class="question-input">
      <div class="question-input__eyebrow">Your question · คำถาม</div>
      <div class="question-input__panel">
        <textarea
          class="question-input__textarea"
          id="question-text-input"
          placeholder="คุณอยากถามอะไร"
          aria-label="คำถามของคุณ"
          rows="2"
          maxlength="180"
        ></textarea>
        <div class="question-input__hint" aria-hidden="true">What's on your mind?</div>
        <div class="question-input__meta" aria-hidden="true">
          <span class="question-input__counter" id="question-text-counter">0 / 180</span>
          <span class="question-input__specific thai">ถามให้ชัดเจน · <span class="question-input__specific-en">Be specific</span></span>
        </div>
      </div>
    </section>

    <section class="question-shape-picker" role="group" aria-label="เลือกรูปแบบการอ่าน">
      <div class="question-shape-picker__eyebrow">Pick a shape · เลือกรูปแบบ</div>
      <div class="question-shape-picker__panels">
        <button class="question-shape-card question-spread-btn question-spread-btn--active" data-spread="quick" aria-pressed="true">
          <div class="question-shape-card__num question-shape-card__num--quick" aria-hidden="true">1</div>
          <div class="question-shape-card__text">
            <div class="question-shape-card__title-row">
              <span class="question-shape-card__title">Quick Pull</span>
              <span class="question-shape-card__title-th thai">· ดึงไพ่เร็ว</span>
            </div>
            <div class="question-shape-card__note">การอ่านสั้น ๆ สำหรับคำถามง่าย ๆ</div>
          </div>
          <div class="question-shape-card__check" aria-hidden="true">✓</div>
        </button>
        <button class="question-shape-card question-spread-btn" data-spread="story" aria-pressed="false">
          <div class="question-shape-card__num question-shape-card__num--story" aria-hidden="true">3</div>
          <div class="question-shape-card__text">
            <div class="question-shape-card__title-row">
              <span class="question-shape-card__title">Story Spread</span>
              <span class="question-shape-card__title-th thai">· เรื่องราว</span>
            </div>
            <div class="question-shape-card__note">การอ่านที่ลึกขึ้น สำหรับเรื่องที่ค้างคาใจ</div>
          </div>
          <div class="question-shape-card__check" aria-hidden="true">✓</div>
        </button>
      </div>
    </section>

    <div class="question-cta-row">
      <button class="ritual-cta question-continue-button" type="button" id="question-continue" disabled>Continue · ต่อไป</button>
    </div>

  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="../js/main.js?v=20260623d"></script>
