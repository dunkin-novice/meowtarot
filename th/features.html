<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>โหมดการอ่าน | MeowTarot</title>
  <meta name="description" content="เลือกโหมดดูดวงรายวัน ถามคำถาม หรือดูดวงชีวิตใน MeowTarot" />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.meowtarot.com/th/features.html" />
  <link rel="alternate" href="https://www.meowtarot.com/features.html" hreflang="en" />
  <link rel="alternate" href="https://www.meowtarot.com/th/features.html" hreflang="th-TH" />
  <link rel="alternate" href="https://www.meowtarot.com/features.html" hreflang="x-default" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="home">
  <header id="site-header"></header>

  <main class="page-shell home-page">
    <section class="home-hero-card home-hero-card--chooser" aria-labelledby="features-title">
      <div class="home-hero-copy home-hero-copy--centered">
        <p class="eyebrow">เหมียวทาโร่ต์</p>
        <h1 class="home-hero-title" id="features-title">เลือกแบบการอ่านของคุณ</h1>
      </div>
      <div class="home-path-grid" role="list" aria-label="เส้นทางการอ่านไพ่">
        <a class="reading-path-card reading-path-card--chooser" href="/th/daily.html" role="listitem" aria-label="เลือกการอ่านรายวัน">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/daily-default.webp" alt="ภาพตัวอย่างเมนูดูดวงรายวัน" width="360" height="600" loading="eager" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/daily-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">วันนี้ดวงเป็นอย่างไร?</h2>
          <p class="reading-path-card__meta">ดูดวงรายวัน</p>
        </a>
        <a class="reading-path-card reading-path-card--chooser" href="/th/full.html" role="listitem" aria-label="เลือกการอ่านภาพรวมชีวิตช่วงนี้">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/celtic-default.webp" alt="ภาพตัวอย่างเมนูเซลติกครอส" width="360" height="600" loading="lazy" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/celtic-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">ช่วงนี้ชีวิตเป็นอย่างไร?</h2>
          <p class="reading-path-card__meta">อ่านภาพรวมชีวิตในช่วง 6–12 เดือนข้างหน้า</p>
        </a>
        <a class="reading-path-card reading-path-card--chooser" href="/th/question.html" role="listitem" aria-label="เลือกการอ่านแบบถามคำถาม">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/question-default.webp" alt="ภาพตัวอย่างเมนูถามคำถาม" width="360" height="600" loading="lazy" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/question-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">ถามคำถาม</h2>
          <p class="reading-path-card__meta">เหมาะกับการสำรวจทีละเรื่องแบบโฟกัสในช่วง 3–6 เดือนข้างหน้า</p>
        </a>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script type="module" src="/js/features.js"></script>
</body>
</html>
