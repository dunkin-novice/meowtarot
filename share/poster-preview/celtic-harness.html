<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Contentsquare -->
  <script src="https://t.contentsquare.net/uxa/fa014b9052a66.js" defer></script><meta charset="utf-8" /><title>Celtic poster harness</title>
<style>body{margin:0;background:#222}#out{color:#fff;font-family:sans-serif;padding:8px}</style></head>
<body>
<div id="out">rendering…</div>
<script type="module">
  import { buildPoster } from '/share/poster.js';
  const ids = ['01-the-fool','02-the-magician','03-the-high-priestess','04-the-empress','05-the-emperor','06-the-hierophant','07-the-lovers','08-the-chariot','09-strength','10-the-hermit'];
  const cards = ids.map((id) => ({ id, orientation: 'upright' }));
  const payload = { version: 1, lang: 'en', mode: 'full', spread: 'celtic', cards, poster: { mode: 'full', footer: 'meowtarot.com' } };
  try {
    const { blob, width, height } = await buildPoster(payload, { preset: 'story' });
    const img = new Image();
    img.onload = () => { window.__posterReady = true; };
    img.src = URL.createObjectURL(blob);
    img.style.width = '360px';
    img.style.display = 'block';
    const out = document.getElementById('out');
    out.textContent = `rendered ${width}x${height}`;
    out.appendChild(img);
  } catch (e) {
    document.getElementById('out').textContent = 'ERR: ' + (e && e.message);
    window.__posterErr = e && e.message;
  }
</script>
</body>
</html>
