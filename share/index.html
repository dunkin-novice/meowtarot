<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-08TSR2R1ZD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-08TSR2R1ZD');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Share Poster – MeowTarot</title>
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="Share your MeowTarot reading as a poster you can save or share." />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=Prata&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=Prata&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=Prata&display=swap"
    />
  </noscript>
  <link rel="stylesheet" href="/share/share.css" />
</head>
<body>
  <main class="share-root">
    <section class="poster-section">
      <div class="share-intro">
        <p class="share-intro__eyebrow" id="sharePromptTitle">Your shareable poster is ready</p>
        <p class="share-intro__body" id="sharePromptBody">Save it for yourself or post it while the message still feels fresh.</p>
      </div>
      <div class="share-copy" id="shareCopyPanel" hidden>
        <p class="share-copy__label" id="shareCopyLabel">One-click share text</p>
        <div class="share-copy__chips" role="group" aria-label="Share text quick copy">
          <button class="share-chip" type="button" data-platform="tiktok">TikTok</button>
          <button class="share-chip" type="button" data-platform="ig_story">IG Story</button>
          <button class="share-chip" type="button" data-platform="line">Line</button>
          <button class="share-chip" type="button" data-platform="x">X</button>
        </div>
      </div>
      <div class="poster-frame" aria-live="polite">
        <img id="posterPreview" alt="MeowTarot poster preview" />
      </div>
    </section>

    <div class="poster-loading" id="posterLoading" aria-live="polite" hidden>Generating poster…</div>
    <div class="sr-only" id="posterHint">กดค้างที่รูปเพื่อบันทึก</div>
    <div class="share-toast" id="shareStatus" aria-live="polite" hidden></div>
    <div class="ig-open-banner" id="igOpenBanner" hidden>
      <span id="igOpenText">For best sharing results, open in Safari/Chrome.</span>
      <button class="action-btn ghost ig-open-btn" id="igOpenBtn" type="button">Open in browser</button>
    </div>

    <nav class="action-bar" aria-label="Share actions">
      <button class="action-btn primary" id="shareAction">Share</button>
      <button class="action-btn" id="retryPoster" type="button" hidden>Retry</button>
      <a class="action-link" id="backToReading" href="/reading.html" hidden>Back to reading</a>
      <a class="action-link" id="openPosterLink" href="#" target="_blank" rel="noopener" hidden>Open poster image</a>
    </nav>
  </main>

  <script type="module" src="/share/share.js"></script>
</body>
</html>
