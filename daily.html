<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>MeowTarot | Daily Reading</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    />
  </noscript>
  <link rel="preload" href="css/styles.css" as="style" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="daily">
  <header id="site-header"></header>

  <main class="page-shell board-page">
    <section class="board-shell">
      <div class="board-header">
        <p class="eyebrow" data-i18n="dailyTitle"></p>
      </div>

      <div class="board-topbar">
        <div class="board-controls">
          <button class="primary ritual-cta" type="button" id="daily-deal-shuffle">Deal</button>
          <button class="primary continue-btn" type="button" id="daily-continue" data-i18n="continue" disabled></button>
        </div>
        <span class="selection-counter" id="daily-counter">0/1</span>
      </div>

      <div class="card-board card-board--daily" id="daily-board" aria-live="polite"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
