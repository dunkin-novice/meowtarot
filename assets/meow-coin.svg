<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Meow Coin">
  <defs>
    <radialGradient id="mcFace" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="45%" stop-color="#f5c25a"/>
      <stop offset="100%" stop-color="#d8973a"/>
    </radialGradient>
    <linearGradient id="mcRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d27a"/>
      <stop offset="100%" stop-color="#b9772a"/>
    </linearGradient>
  </defs>
  <!-- coin body -->
  <circle cx="32" cy="32" r="30" fill="url(#mcRim)"/>
  <circle cx="32" cy="32" r="26" fill="url(#mcFace)" stroke="#b9772a" stroke-width="1.5"/>
  <!-- inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#c9933a" stroke-width="1.4" stroke-opacity="0.55"/>
  <!-- cat paw print (plum) -->
  <g fill="#3d1a5c" opacity="0.92">
    <!-- main pad -->
    <path d="M32 44.5c-5.4 0-9.4-3.3-9.4-7.3 0-3.6 3.9-6 9.4-6s9.4 2.4 9.4 6c0 4-4 7.3-9.4 7.3z"/>
    <!-- toe beans -->
    <ellipse cx="22.5" cy="27.5" rx="3.1" ry="4"/>
    <ellipse cx="29" cy="23.5" rx="3.1" ry="4.2"/>
    <ellipse cx="35" cy="23.5" rx="3.1" ry="4.2"/>
    <ellipse cx="41.5" cy="27.5" rx="3.1" ry="4"/>
  </g>
  <!-- shine -->
  <ellipse cx="24" cy="20" rx="7" ry="4" fill="#fff" opacity="0.35"/>
</svg>
