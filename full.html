<body data-page="full">

  <header id="site-header"></header>

  <main class="page-shell board-page full-shell">

    <!-- Phase 5 B1 rebuild: 12-card grid, pick 10, no arrange step.
         Positions auto-assigned by pick order (1st = The Situation,
         2nd = Crossing, … 10th = Outcome) via FULL_READING_POSITION_KEYS
         in js/full-reading-position-order.js. -->
    <section class="full-state full-state--board" aria-labelledby="full-board-title">
      <div class="full-topbar full-topbar--board">
        <div class="full-topbar__deck">
          <div class="full-topbar__deck-eyebrow">From the deck</div>
          <div class="full-topbar__deck-name">Moonmallow</div>
        </div>
        <div class="full-topbar__streak-chip" aria-label="streak">
          <span class="full-topbar__streak-num">✦</span>
          <span class="full-topbar__streak-label"></span>
        </div>
      </div>

      <div class="full-board-title">
        <h1 class="full-board-title__en" id="full-board-title">Choose ten cards</h1>
        <p class="full-board-title__hint">Pick in the order that feels right. The first card becomes <em>The Situation</em>.</p>
      </div>

      <!-- Shuffle: re-deals a fresh 12-card spread and clears any pick -->
      <div class="full-shuffle-row">
        <button class="full-shuffle-btn" type="button" id="full-shuffle" aria-label="Shuffle the deck">
          <span class="full-shuffle-btn__ico" aria-hidden="true">↻</span>
          <span>Shuffle</span>
        </button>
      </div>

      <div class="card-board card-board--full" id="full-board" aria-live="polite"></div>

      <div class="full-board-counter" aria-live="polite">
        <span id="full-counter">0/10</span>
      </div>

      <div class="full-state__cta-row">
        <button class="primary continue-btn action-btn full-continue-button" type="button" id="full-continue" disabled>Continue</button>
      </div>
    </section>

  </main>
