<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>MeowTarot | Celtic Cross Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    />
  </noscript>
  <link rel="preload" href="css/styles.css" as="style" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="full">
  <header id="site-header"></header>

  <main class="page-shell board-page">
    <section class="board-shell full-board-shell">
      <div class="board-header">
        <p class="eyebrow" data-i18n="celticCrossEyebrow"></p>
        <h1 data-i18n="celticCrossTitle"></h1>
      </div>

      <section id="overall-flow" class="full-flow">
        <div class="board-toolbar" id="overall-toolbar" hidden>
          <button id="overall-shuffle" type="button" class="secondary" data-i18n="shuffleCards"></button>
          <span class="selection-counter" id="overall-counter">0/10</span>
        </div>

        <div id="overall-card-board" class="card-board card-board--full" hidden></div>

        <div class="board-actions board-actions--center" id="overall-actions" hidden>
          <button id="overall-continue" type="button" class="primary" data-i18n="continue" disabled></button>
        </div>
      </section>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
