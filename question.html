<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>MeowTarot | Ask a Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    />
  </noscript>
  <link rel="preload" href="css/styles.css" as="style" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="question">
  <header id="site-header"></header>

  <main class="page-shell question-page-shell">
    <section class="section-block question-flow-card">
      <div class="question-flow-intro">
        <p class="eyebrow">MeowTarot</p>
        <h1 data-i18n="questionTitle"></h1>
        <p class="lede" data-i18n="questionLead"></p>
      </div>

      <div class="question-flow-layout">
        <section class="topic-selection-panel" aria-labelledby="topic-selection-title">
          <div class="section-heading section-heading--tight">
            <p class="eyebrow" data-i18n="questionDesc"></p>
            <h2 id="topic-selection-title" data-i18n="questionTopicSelectionTitle"></h2>
            <p data-i18n="questionTopicSelectionBody"></p>
          </div>
          <div class="topic-card-grid" id="question-topic-grid"></div>
        </section>

        <aside class="question-intention" aria-label="Question reading guide">
          <div class="question-intention__intro">
            <h2 data-i18n="questionPromptTitle"></h2>
            <p data-i18n="questionPromptBody"></p>
          </div>
          <div class="question-intention__steps">
            <p class="question-step" data-i18n="questionStepTopic"></p>
            <p class="question-step" data-i18n="questionStepDraw"></p>
            <p class="question-step" data-i18n="questionStepRead"></p>
          </div>
        </aside>
      </div>

      <section class="question-draw-panel" id="question-draw-panel" hidden aria-labelledby="question-selected-topic-title">
        <div class="question-draw-header">
          <div>
            <p class="question-selected-label" data-i18n="questionSelectedTopicLabel"></p>
            <h2 id="question-selected-topic-title"></h2>
          </div>
          <p class="chip chip-active question-spread-chip" data-i18n="questionSpreadNote"></p>
        </div>

        <div class="board-toolbar" id="question-toolbar" hidden>
          <button id="question-reset" type="button" class="ghost" data-i18n="shuffleCards"></button>
          <span class="selection-counter" id="question-counter">0/3</span>
        </div>
        <div id="question-card-board" class="card-board card-board--three" hidden></div>
        <div class="board-actions" id="question-actions" hidden>
          <button id="question-continue" type="button" class="primary" data-i18n="continue" disabled></button>
        </div>
      </section>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
