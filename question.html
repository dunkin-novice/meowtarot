<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>MeowTarot | 3-Card Spread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    />
  </noscript>
  <link rel="preload" href="css/styles.css" as="style" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="question">
  <header id="site-header"></header>

  <main class="page-shell">
    <section class="section-block">
      <p class="eyebrow" data-i18n="questionDesc"></p>
      <h1 data-i18n="questionTitle"></h1>
      <p class="lede" data-i18n="questionLead"></p>

      <p class="chip chip-active" data-i18n="questionSpreadNote"></p>

      <section class="question-intention" aria-label="Question reading guide">
        <div class="question-intention__intro">
          <h2 data-i18n="questionPromptTitle"></h2>
          <p data-i18n="questionPromptBody"></p>
        </div>
        <div class="question-intention__steps">
          <p class="question-step" data-i18n="questionStepTopic"></p>
          <p class="question-step" data-i18n="questionStepDraw"></p>
          <p class="question-step" data-i18n="questionStepRead"></p>
        </div>
      </section>

      <div class="topic-chips" id="topic-toggle">
        <button type="button" data-topic="love" class="chip chip-active" data-i18n="topicLove"></button>
        <button type="button" data-topic="career" class="chip" data-i18n="topicCareer"></button>
        <button type="button" data-topic="finance" class="chip" data-i18n="topicFinance"></button>
      </div>

      <div class="board-toolbar" id="question-toolbar" hidden>
        <button id="question-reset" type="button" class="ghost" data-i18n="shuffleCards"></button>
        <span class="selection-counter" id="question-counter">0/3</span>
      </div>
      <div id="question-card-board" class="card-board card-board--three" hidden></div>
      <div class="board-actions">
        <button id="question-continue" type="button" class="primary" data-i18n="continue" disabled></button>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
