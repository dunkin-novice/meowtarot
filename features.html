<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Reading Modes | MeowTarot</title>
  <meta name="description" content="Choose between Daily Reading, Ask a Question, and Full Reading in MeowTarot." />
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.meowtarot.com/features.html" />
  <link rel="alternate" href="https://www.meowtarot.com/features.html" hreflang="en" />
  <link rel="alternate" href="https://www.meowtarot.com/th/features.html" hreflang="th-TH" />
  <link rel="alternate" href="https://www.meowtarot.com/features.html" hreflang="x-default" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body data-page="home">
  <header id="site-header"></header>

  <main class="page-shell home-page">
    <section class="home-hero-card home-hero-card--chooser" aria-labelledby="features-title">
      <div class="home-hero-copy home-hero-copy--centered">
        <p class="eyebrow">MeowTarot</p>
        <h1 class="home-hero-title" id="features-title">Choose your reading</h1>
      </div>
      <div class="home-path-grid" role="list" aria-label="Reading paths">
        <a class="reading-path-card reading-path-card--chooser" href="/daily.html" role="listitem" aria-label="Choose Today reading">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/daily-default.webp" alt="Daily Reading feature preview" width="360" height="600" loading="eager" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/daily-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">How’s today looking?</h2>
          <p class="reading-path-card__meta">Daily Reading</p>
        </a>
        <a class="reading-path-card reading-path-card--chooser" href="/full.html" role="listitem" aria-label="Choose Recent Path reading">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/celtic-default.webp" alt="Celtic Cross feature preview" width="360" height="600" loading="lazy" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/celtic-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">How’s my life lately?</h2>
          <p class="reading-path-card__meta">Reading for the next 6–12 months</p>
        </a>
        <a class="reading-path-card reading-path-card--chooser" href="/question.html" role="listitem" aria-label="Choose Ask reading">
          <span class="reading-path-card__media">
            <img class="reading-path-card__image reading-path-card__image--default" src="https://cdn.meowtarot.com/assets/images/features/question-default.webp" alt="Ask a Question feature preview" width="360" height="600" loading="lazy" />
            <img class="reading-path-card__image reading-path-card__image--active" src="https://cdn.meowtarot.com/assets/images/features/question-active.webp" alt="" aria-hidden="true" width="360" height="600" loading="lazy" />
          </span>
          <h2 class="reading-path-card__label">Ask a Question</h2>
          <p class="reading-path-card__meta">Best for exploring one topic at a time over the next 3–6 months.</p>
        </a>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>
  <script type="module" src="/js/features.js"></script>
</body>
</html>
